# MCP (Model Context Protocol) 配置文件
# 用于管理多个 MCP 服务器的启动和工具集成
#
# 使用说明:
#   1. 普通 MCP 模式：python -m src.codex.cli --mcp
#   2. VFS 专业模式：python -m src.codex.cli --vfs
#      - 自动启动 Electron 应用
#      - 自动连接 MCP 服务器
#      - 屏蔽本地文件工具

# 是否启用 MCP 功能
enabled: true

# MCP 服务器列表
# 每个服务器可以独立配置命令、参数和是否启用
# 支持两种传输方式：
# 1. stdio: 使用 command + args 启动子进程
# 2. websocket: 使用 websocket_url 连接到远程 MCP 服务器
servers:
  # Playwright MCP - 浏览器自动化 (stdio 模式)
  - name: playwright
    description: "浏览器自动化操作（导航、点击、截图等）"
    enabled: false  # 默认禁用，需要时手动开启
    command: npx
    args:
      - "-y"
      - "@playwright/mcp@latest"

  # RJCut Studio Electron MCP - VFS 虚拟文件系统 (WebSocket 模式)
  # 使用 --vfs 参数时自动启用此配置
  # 架构：Codex --WS--> Electron MCP Server --原生--> 虚拟文件系统
  - name: rjcut_vfs
    description: "RJCut Studio 虚拟文件系统（VFS 专业模式）"
    enabled: true
    websocket_url: "ws://localhost:8001/ws"
    # Electron 应用配置（手动启动模式）
    # 使用独立 PowerShell 窗口启动：
    #   .\scripts\start_rjcut_studio.ps1 -studioPath "D:\workspace\rjcut\studio"
    electron:
      app_path: "D:\\workspace\\rjcut\\studio"
      # 使用 cmd /c start 在新窗口中启动 PowerShell（Windows 最可靠方式）
      # 虽然用的是 cmd，但实际运行的是 PowerShell 脚本
      start_command: "cmd"
      start_args: ["/c", "start", "RJCut Studio MCP", "powershell", "-ExecutionPolicy", "Bypass", "-File", "scripts\\start_rjcut_studio.ps1", "-studioPath", "D:\\workspace\\rjcut\\studio"]
      # 等待 MCP 服务器就绪的时间（秒）- 新窗口启动需要更长时间
      wait_time: 15
    # 可用工具：
    #   - vfs_list: 列出目录内容
    #   - vfs_read: 读取文件
    #   - vfs_write: 写入文件
    #   - vfs_delete: 删除文件/目录
    #   - vfs_move: 移动/重命名
    #   - vfs_copy: 复制文件
    #   - vfs_mkdir: 创建目录
    #   - vfs_exists: 检查路径是否存在
    #   - vfs_search: 搜索文件
    #   - vfs_search_videos: 搜索视频文件
    #   - vfs_search_json: 搜索 JSON 文件
    #   - vfs_project_list: 列出项目
    #   - vfs_project_create: 创建项目
    #   - vfs_project_read: 读取项目配置
    #   - vfs_project_update: 更新项目配置
    #   - vfs_storage_info: 获取存储信息

  # RJCut Studio Electron MCP - 旧版兼容配置（手动启动模式）
  - name: rjcut_studio
    description: "RJCut Studio Electron MCP 服务器（手动启动）"
    enabled: false
    websocket_url: "ws://localhost:8001/ws"

# 全局设置
settings:
  # 启动超时时间（秒）
  startup_timeout: 30
  # 工具调用超时时间（秒）
  call_timeout: 60
  # 是否显示详细日志
  verbose: false
