# MCP (Model Context Protocol) 配置文件
# 用于管理多个 MCP 服务器的启动和工具集成

# 是否启用 MCP 功能
enabled: true

# MCP 服务器列表
# 每个服务器可以独立配置命令、参数和是否启用
servers:
  # Playwright MCP - 浏览器自动化
  - name: playwright
    description: "浏览器自动化操作（导航、点击、截图等）"
    enabled: true
    command: npx
    args:
      - "-y"
      - "@playwright/mcp@latest"

# 全局设置
settings:
  # 启动超时时间（秒）
  startup_timeout: 30
  # 工具调用超时时间（秒）
  call_timeout: 60
  # 是否显示详细日志
  verbose: false
