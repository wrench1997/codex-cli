# MCP (Model Context Protocol) 配置文件
# 用于管理多个 MCP 服务器的启动和工具集成

# 是否启用 MCP 功能
enabled: true

# MCP 服务器列表
# 每个服务器可以独立配置命令、参数和是否启用
# 支持两种传输方式：
# 1. stdio: 使用 command + args 启动子进程
# 2. websocket: 使用 websocket_url 连接到远程 MCP 服务器
servers:
  # Playwright MCP - 浏览器自动化 (stdio 模式)
  - name: playwright
    description: "浏览器自动化操作（导航、点击、截图等）"
    enabled: true
    command: npx
    args:
      - "-y"
      - "@playwright/mcp@latest"

  # IndexedDB VFS MCP - RJCut Studio 虚拟文件系统 (WebSocket 模式 - 旧版)
  # 需要先启动：
  # 1. RJCut Studio: cd studio && npm run dev
  # 2. MCP Proxy: node mcp-proxy-server.js
  - name: indexeddb_vfs
    description: "RJCut Studio IndexedDB 虚拟文件系统（旧版 WebSocket 模式）"
    enabled: false
    websocket_url: "ws://localhost:8001/ws?clientId=studio&role=client"

  # Chrome Extension VFS - RJCut Studio 虚拟文件系统 (通过 Bridge Server)
  # 使用方法：
  # 1. 在 Chrome 中加载 mcp-proxy-extension 扩展
  # 2. 启动 Bridge Server: cd studio/mcp-bridge-server && npm install && npm start
  # 3. Codex 会自动通过 WebSocket 连接到 Bridge Server
  # 架构：Codex --WS--> Bridge Server --HTTP 轮询--> Chrome Extension --IndexedDB--> RJCut Studio VFS
  - name: chrome_vfs
    description: "RJCut Studio IndexedDB VFS (通过 Bridge Server，推荐)"
    enabled: false
    websocket_url: "ws://localhost:8766/mcp"
    # 注意：使用 WebSocket 模式时，command 和 args 会被忽略

# 全局设置
settings:
  # 启动超时时间（秒）
  startup_timeout: 30
  # 工具调用超时时间（秒）
  call_timeout: 60
  # 是否显示详细日志
  verbose: false
